name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'

  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:5000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

  deploy-vercel:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

  deploy-backend:
    if: github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    needs: [build, changes]
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: tcc-israel-navarro
      GCP_REGION: us-central1
      IMAGE_NAME: sapos-backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Define backend target
        shell: bash
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "SERVICE_NAME=sapos-backend" >> $GITHUB_ENV
            echo "FRONTEND_ORIGINS=https://sapos-eight.vercel.app" >> $GITHUB_ENV
          else
            echo "SERVICE_NAME=sapos-backend-hom" >> $GITHUB_ENV
            echo "FRONTEND_ORIGINS=https://sapos-eight-hom.vercel.app" >> $GITHUB_ENV
          fi
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build backend image
        run: gcloud builds submit ./backend --tag gcr.io/$GCP_PROJECT_ID/$IMAGE_NAME:$IMAGE_TAG

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$GCP_PROJECT_ID/$IMAGE_NAME:$IMAGE_TAG \
            --platform managed \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --service-account sapos-sa@tcc-israel-navarro.iam.gserviceaccount.com \
            --update-env-vars FRONTEND_ORIGINS=$FRONTEND_ORIGINS,DATABASE_URL=${{ secrets.DATABASE_URL }}